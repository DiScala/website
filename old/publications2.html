<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Publication Filter (Enhanced)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f8f9fa;
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    /* Container for filters */
    .filter-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    input {
      width: 250px;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .clear-btn, .clear-keyword-btn {
      background: #dc3545;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 14px;
    }

    .clear-btn:hover, .clear-keyword-btn:hover {
      background: #b52a37;
    }

    /* Category buttons */
    .filters-container {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin-bottom: 15px;
    }

    .category-btn {
      position: relative;
      padding: 6px 20px 6px 12px;
      border-radius: 20px;
      border: 1px solid #007bff;
      background-color: white;
      color: #007bff;
      cursor: pointer;
      transition: background-color 0.2s, color 0.2s;
      display: inline-flex;
      align-items: center;
    }

    .category-btn.active {
      background-color: #007bff;
      color: white;
    }

    .category-btn::after {
      content: '×';
      opacity: 0;
      position: absolute;
      right: 8px;
      font-weight: bold;
      pointer-events: none;
      transition: opacity 0.2s;
      color: white;
    }

    .category-btn.active:hover::after {
      opacity: 1;
    }

    /* Cards container */
    #cardsContainer {
      max-width: 900px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 15px;
    }

    /* Card styling */
    .card {
      display: flex;
      align-items: flex-start;
      gap: 15px;
      border: 1px solid #ccc;
      background: white;
      padding: 15px;
      border-radius: 12px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: scale(1.02);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .card img {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 8px;
    }

    .card-content {
      flex: 1;
    }

    .card h3 {
      margin: 0;
    }

    .keywords {
      margin: 4px 0;
      color: #555;
    }

    .takeaway-buttons {
      margin-top: 8px;
      display: flex;
      gap: 8px;
    }

    .takeaway-btn {
      background: #e9ecef;
      border: none;
      border-radius: 6px;
      padding: 4px 8px;
      cursor: pointer;
      font-size: 13px;
    }

    .takeaway-btn.active {
      background: #007bff;
      color: white;
    }

    .abstract {
      margin-top: 8px;
      color: #333;
    }

    .link {
      display: inline-block;
      margin-top: 8px;
      color: #007bff;
      text-decoration: none;
    }

    .link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1>Publications</h1>

  <div class="filter-panel">
    <input type="text" id="keywordInput" placeholder="Filter by keyword..." />
    <button class="clear-keyword-btn" id="clearKeywordBtn">Clear Keyword</button>
    <button class="clear-btn" id="clearBtn">Clear Filters</button>
  </div>

  <div class="filters-container" id="categoryBar"></div>

  <div id="cardsContainer"></div>

  <script>
    const publications = [
      {
        title: "Deep Learning in Medicine",
        authors: "J. Smith, A. Doe",
        simple: "AI helps detect diseases efficiently.",
        complex: "AI models can process vast medical data to support diagnostics and treatment planning.",
        full: "We explore deep learning applications in modern healthcare. Our work examines neural architectures for diagnostic imaging and patient record analysis.",
        year: 2023,
        keywords: ["AI", "Healthcare", "Deep Learning"],
        link: "files/deep_learning_in_medicine.pdf",
        image: "images/paper1.png"
      },
      {
        title: "Quantum Computing Advances",
        authors: "R. Wang, M. Patel",
        simple: "Quantum computers solve problems classical ones can't.",
        complex: "Quantum algorithms provide speedups for certain classes of problems compared to classical counterparts.",
        full: "This paper investigates the use of quantum algorithms and the scaling of qubit fidelity in next-generation hardware.",
        year: 2024,
        keywords: ["Quantum", "Computing", "Algorithms"],
        link: "files/quantum_computing_advances.pdf",
        image: "images/paper2.png"
      },
      {
        title: "Ethics in AI Systems",
        authors: "L. Chen",
        simple: "AI systems must respect fairness and accountability.",
        complex: "Ethical design in AI requires careful consideration of bias, transparency, and governance.",
        full: "A survey on ethical concerns in artificial intelligence, including fairness, explainability, and societal implications.",
        year: 2022,
        keywords: ["AI", "Ethics", "Governance"],
        link: "files/ethics_in_ai.pdf",
        image: "images/paper3.png"
      },
      {
        title: "Climate Modeling with HPC",
        authors: "K. Müller",
        simple: "Supercomputers enhance weather prediction models.",
        complex: "High-performance computing allows larger-scale simulations improving climate forecasting accuracy.",
        full: "Using high-performance computing to improve climate prediction and understanding of atmospheric processes.",
        year: 2021,
        keywords: ["HPC", "Climate", "Simulation"],
        link: "files/climate_modeling_hpc.pdf",
        image: "images/paper4.png"
      }
    ];

    const keywordInput = document.getElementById("keywordInput");
    const categoryBar = document.getElementById("categoryBar");
    const clearBtn = document.getElementById("clearBtn");
    const clearKeywordBtn = document.getElementById("clearKeywordBtn");
    const cardsContainer = document.getElementById("cardsContainer");

    const allKeywords = [...new Set(publications.flatMap(p => p.keywords))].sort();
    const selectedKeywords = [];

    function renderCategoryButtons() {
      categoryBar.innerHTML = '';
      const unselected = allKeywords.filter(k => !selectedKeywords.includes(k));
      const ordered = [...selectedKeywords, ...unselected];
      ordered.forEach(keyword => {
        const isActive = selectedKeywords.includes(keyword);
        const btn = document.createElement("button");
        btn.className = "category-btn";
        if (isActive) btn.classList.add("active");
        btn.textContent = keyword;
        btn.addEventListener("click", () => {
          if (isActive) {
            const idx = selectedKeywords.indexOf(keyword);
            if (idx > -1) selectedKeywords.splice(idx, 1);
          } else {
            selectedKeywords.push(keyword);
          }
          renderCategoryButtons();
          applyFilters();
        });
        categoryBar.appendChild(btn);
      });
    }

    function applyFilters() {
      const keyword = keywordInput.value.toLowerCase();
      const filtered = publications.filter(pub => {
        const matchesKeywords =
          selectedKeywords.length === 0 ||
          pub.keywords.some(k => selectedKeywords.includes(k));
        const matchesSearch =
          pub.title.toLowerCase().includes(keyword) ||
          pub.authors.toLowerCase().includes(keyword) ||
          pub.simple.toLowerCase().includes(keyword) ||
          pub.complex.toLowerCase().includes(keyword) ||
          pub.full.toLowerCase().includes(keyword);
        return matchesKeywords && matchesSearch;
      });
      renderCards(filtered);
    }

    function highlightAuthors(authors) {
      return authors.split(",").map(a => `<strong>${a.trim()}</strong>`).join(", ");
    }

    function renderCards(data) {
      cardsContainer.innerHTML = '';
      if (data.length === 0) {
        cardsContainer.innerHTML = '<p style="text-align:center;">No matching publications found.</p>';
        return;
      }

      data.forEach(pub => {
        const card = document.createElement("div");
        card.className = "card";
        const activeTakeaway = "simple";
        card.innerHTML = `
          <img src="${pub.image}" alt="${pub.title}">
          <div class="card-content">
            <h3>${pub.title} (${pub.year})</h3>
            <p>${highlightAuthors(pub.authors)}</p>
            <p class="keywords"><strong>Keywords:</strong> ${pub.keywords.join(", ")}</p>
            <div class="takeaway-buttons">
              <button class="takeaway-btn active" data-type="simple">Simple</button>
              <button class="takeaway-btn" data-type="complex">Complex</button>
              <button class="takeaway-btn" data-type="full">Full</button>
            </div>
            <p class="abstract">${pub.simple}</p>
            <a href="${pub.link}" target="_blank" class="link">View Paper →</a>
          </div>
        `;

        const btns = card.querySelectorAll(".takeaway-btn");
        const abstractP = card.querySelector(".abstract");

        btns.forEach(btn => {
          btn.addEventListener("click", () => {
            btns.forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            const type = btn.dataset.type;
            abstractP.textContent = pub[type];
          });
        });

        cardsContainer.appendChild(card);
      });
    }

    clearBtn.addEventListener("click", () => {
      selectedKeywords.length = 0;
      keywordInput.value = '';
      renderCategoryButtons();
      applyFilters();
    });

    clearKeywordBtn.addEventListener("click", () => {
      keywordInput.value = '';
      applyFilters();
    });

    keywordInput.addEventListener("input", applyFilters);

    // Initial render
    renderCategoryButtons();
    renderCards(publications);
  </script>

</body>
</html>
