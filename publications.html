  function applyURLParameters() {
    const params = new URLSearchParams(window.location.search);

    // Option A: ?filter=apple
    if (params.has("filter")) {
      const keyword = params.get("filter");
      if (allKeywords.includes(keyword)) {
        selectedKeywords.push(keyword);
      }
    }

    // Option B: ?id=banana  → fills search bar
    if (params.has("id")) {
      const term = params.get("id");
      keywordInput.value = term.toLowerCase();
      applyFilters();
    }
  }

  function renderCategoryButtons() {
    categoryBar.innerHTML = '';
    const unselected = allKeywords.filter(k => !selectedKeywords.includes(k));
    const ordered = [...selectedKeywords, ...unselected];
    ordered.forEach(keyword => {
      const isActive = selectedKeywords.includes(keyword);
      const btn = document.createElement("button");
      btn.className = "category-btn";
      if (isActive) btn.classList.add("active");
      btn.textContent = keyword;
      btn.addEventListener("click", () => {
        if (isActive) {
          const idx = selectedKeywords.indexOf(keyword);
          if (idx > -1) selectedKeywords.splice(idx, 1);
        } else {
          selectedKeywords.push(keyword);
        }
        renderCategoryButtons();
        applyFilters();
      });
      categoryBar.appendChild(btn);
    });
  }

  function applyFilters() {
    const keyword = keywordInput.value.toLowerCase();
    let filtered = publications.filter(pub => {
      const matchesKeywords =
        selectedKeywords.length === 0 ||
        pub.keywords.some(k => selectedKeywords.includes(k));
      const matchesSearch =
        pub.title.toLowerCase().includes(keyword) ||
        pub.authors.join(", ").toLowerCase().includes(keyword) ||
        pub.simple.toLowerCase().includes(keyword) ||
        pub.complex.toLowerCase().includes(keyword);
      return matchesKeywords && matchesSearch;
    });

    filtered.sort((a, b) => {
      if (currentSort === "year") return b.year - a.year;
      else return b.citations - a.citations;
    });

    renderCards(filtered);
  }

  function renderAuthors(authors) {
    return authors.map(a =>
      a === "D.Di Scala" ? `<span class="author-smith">${a} </span>` : `<span>${a} </span>`
    ).join(",&nbsp;");
  }

    if (data.length === 0) {

      return;
    }

    data.forEach(pub => {
      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = ""

      if (pub.keywords.includes("Blog") ){
        link_text = "Blog"}
      else{
      link_text = "Paper"}

      if (pub.image) {
        card.innerHTML += `
       <div class="pub-image">
          <img src="${pub.image}" alt="${pub.title}">

          <div class="paper-actions">
            
            <!-- Cite button -->
            <button class="paper-btn cite-btn"  onclick="openCiteModal(\`${pub.citationbib}\`)">
              <svg viewBox="0 0 24 24">
                <!-- quote / cite icon -->

              </svg>
              <span>Cite ${link_text}</span>
            </button>

            <!-- Read button -->
            <a href="${pub.link}" target="_blank" class="paper-btn read-btn">
              <svg viewBox="0 0 24 24">
                <!-- book icon -->
                <path d="M19 2H8c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h11a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Zm-1 17H9V4h9v15ZM6 4H5v16h1V4Z"/>
              </svg>
              <span>Read ${link_text}</span>
            </a>

          </div>
        </div>
        `;

      }
      else {
        card.innerHTML += `
<div class="paper-actions">
            
            <!-- Cite button -->
            <button class="paper-btn cite-btn"  onclick="openCiteModal(\`${pub.citationbib}\`)">
              <svg viewBox="0 0 24 24">
                <!-- quote / cite icon -->
                <path d="M7 7h4v4H9v2h2v4H7v-4h2v-2H7V7Zm10 0h-4v4h2v2h-2v4h4v-4h-2v-2h2V7Z"/>
              </svg>
              <span>Cite ${link_text}</span>
            </button>

            <!-- Read button -->
            <a href="${pub.link}" target="_blank" class="paper-btn read-btn">
              <svg viewBox="0 0 24 24">
                <!-- book icon -->
                <path d="M19 2H8c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h11a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1Zm-1 17H9V4h9v15ZM6 4H5v16h1V4Z"/>
              </svg>
              <span>Read ${link_text}</span>
            </a>

          </div>
        `;
      }

      card.innerHTML += `
          <div class="card-content">
            <h3>${pub.title} (${pub.year})</h3>
            <p class="authors">
              ${renderAuthors(pub.authors)}
            </p>
            <p class="keywords">
              ${pub.keywords.sort().join(", ")}
            </p>
            `

      if (pub.simple) {

        card.innerHTML += `
        <div class="abstract-wrap">
            <span class="abstract-icon">
            <svg  viewBox="0 0 640 640">
            <path d="M420.9 448C428.2 425.7 442.8 405.5 459.3 388.1C492 353.7 512 307.2 512 256C512 150 426 64 320 64C214 64 128 150 128 256C128 307.2 148 353.7 180.7 388.1C197.2 405.5 211.9 425.7 219.1 448L420.8 448zM416 496L224 496L224 512C224 556.2 259.8 592 304 592L336 592C380.2 592 416 556.2 416 512L416 496zM312 176C272.2 176 240 208.2 240 248C240 261.3 229.3 272 216 272C202.7 272 192 261.3 192 248C192 181.7 245.7 128 312 128C325.3 128 336 138.7 336 152C336 165.3 325.3 176 312 176z"/>
            </svg>
            </span>
            <p class="abstract">
            ${pub.simple}
            </p>
            <p class="abstract complex hidden">
            ${pub.complex}
            </p>
            `
      }

      if (pub.complex) {
        card.innerHTML += `

        
            <button class="accordion-btn" aria-expanded="false">
            <span class="arrow"></span>
            <span class="label"> Read Complex Take-Away</span>

            </div>
          `;

      card.innerHTML += "</div>"



      cardsContainer.appendChild(card);
    });
  }

  renderCategoryButtons();
  applyFilters();
</script>

<script>
function openCiteModal(bibtex) {
  const modal = document.getElementById("citeModal");
  const bibEl = document.getElementById("citeBibtex");
  const textEl = document.getElementById("citeText");

  bibEl.textContent = bibtex;

  const apa = parseBibToAPA(bibtex);
  textEl.textContent = apa;

  // store for copy buttons
  textEl.dataset.copy = apa;
  bibEl.dataset.copy = bibtex;

  modal.classList.add("open");
}

function closeCiteModal() {
  document.getElementById("citeModal").classList.remove("open");
}

/* click outside to close */
document.getElementById("citeModal").addEventListener("click", function (e) {
  if (e.target === this) closeCiteModal();
});

/* ESC to close */
document.addEventListener("keydown", function (e) {
  if (e.key === "Escape") closeCiteModal();
});

function parseBibToAPA(bib) {
  const getField = (field) => {
    const match = bib.match(new RegExp(field + "\\s*=\\s*[{\"]([^}\"]+)[}\"]", "i"));
    return match ? match[1] : "";
  };

  const formatAuthors = (authors) => {
  if (!authors) return "";

  const list = authors.split(" and ").map(a => a.trim());

  const formatted = list.map((name) => {
    let first = "";
    let last = "";

    if (name.includes(",")) {
      // Format: Last, First
      const parts = name.split(",");
      last = parts[0].trim();
      first = parts[1]?.trim() || "";
    } else {
      // Format: First Last
      const parts = name.split(" ");
      last = parts.pop();
      first = parts.join(" ");
    }

    const initials = first
      .split(" ")
      .filter(Boolean)
      .map(p => p[0].toUpperCase() + ".")
      .join(" ");

    return `${last}, ${initials}`;
  });

  // APA joining
  if (formatted.length === 1) return formatted[0];
  if (formatted.length === 2) return formatted.join(" & ");
  
  return formatted.slice(0, -1).join(", ") + ", & " + formatted.slice(-1);
};

  const author = formatAuthors(getField("author"));
  const year = getField("year");
  const title = getField("title");
  const journal = getField("journal") || getField("booktitle");

  return `${author} (${year}). ${title}. ${journal}.`;
  
}

function copyText(elementId) {
  const el = document.getElementById(elementId);
  const text = el.dataset.copy || el.textContent;

  navigator.clipboard.writeText(text);

  // optional feedback
  const btn = event.target;
  const original = btn.textContent;
  btn.textContent = "Copied!";
  setTimeout(() => (btn.textContent = original), 1200);
}

</script>

<script>
  document.addEventListener("click", (e) => {
    const btn = e.target.closest(".accordion-btn");
    if (!btn) return;

    // Find the nearest card/container
    const container = btn.closest(".card, .abstract-container, div");

    const simple = container.querySelector(".abstract:not(.complex)");
    const complex = container.querySelector(".abstract.complex");

    const expanded = btn.getAttribute("aria-expanded") === "true";

    btn.setAttribute("aria-expanded", String(!expanded));

    if (expanded) {
      complex.classList.add("hidden");
      simple.style.display = "";
    } else {
      complex.classList.remove("hidden");
      simple.style.display = "none";
    }

    btn.querySelector(".label").textContent = expanded
      ? " Read Complex Take-Away"
      : " Collapse Take-Away";
  });

</script>
